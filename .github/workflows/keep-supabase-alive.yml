name: Keep Supabase Alive

on:
  schedule:
    # Every 4 days at 08:00 UTC — keeps free tier from pausing (7 day inactivity limit)
    - cron: '0 8 */4 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase to prevent spin-down
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --request GET \
            --url "${{ secrets.SUPABASE_URL }}/rest/v1/countries?select=code&limit=1" \
            --header "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
